{% load static %}
{% load i18n %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "ERP Login" %}</title>
    <!-- Tailwind CSS CDN (replace with local setup if included in base.html) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6; /* Light gray background */
        }
        .card {
            background-color: #ffffff; /* White card */
            border-radius: 0.75rem; /* Rounded corners */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Subtle shadow */
            animation: fadeIn 0.5s ease-out;
        }
        .input {
            border: 1px solid #d1d5db; /* Light gray border */
            border-radius: 0.375rem; /* Rounded edges */
            background-color: #ffffff; /* White background */
            color: #111827; /* Dark text */
        }
        .login-button {
            background-color: #111827; /* Black button */
            color: #ffffff; /* White text */
            border-radius: 0.375rem; /* Rounded edges */
        }
        .social-button {
            border: 1px solid #d1d5db; /* Light gray border */
            background-color: #ffffff; /* White background */
            border-radius: 0.375rem; /* Rounded edges */
            padding: 0.5rem;
        }
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            border-top: 1px solid #d1d5db; /* Light gray line */
            z-index: 0;
        }
        .divider span {
            background-color: #ffffff; /* White background */
            position: relative;
            z-index: 10;
            padding: 0 0.5rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="w-full max-w-3xl p-4">
        <div class="card overflow-hidden">
            <div class="grid md:grid-cols-2">
                <!-- Form Section -->
                <form method="POST" action="{% url 'permission:login' %}" class="p-6 md:p-8">
                    {% csrf_token %}
                    <!-- Logo -->
                    <div class="flex justify-center mb-4">
                        <img src="{% static 'images/logo/logo.jpeg' %}" alt="ERP Logo" class="h-16  w-auto rounded-xl shadow-lg border border-[#cfa44d] bg-[#0d1a1a] p-2">
                    </div>

                    <!-- Header -->
                    <div class="text-center mb-6">
                        <h1 class="text-2xl font-bold text-gray-900">{% trans "Welcome back" %}</h1>
                        <p class="text-gray-500 text-sm">{% trans "Login to your ERP account" %}</p>
                    </div>

                    <!-- Messages -->
                    {% if messages %}
                        <div class="mb-6">
                            {% for message in messages %}
                                <div class="text-sm text-red-600 bg-red-50 border border-red-200 rounded p-2 text-center animate-[fadeIn_0.4s_ease-out]">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        </div>
                    {% endif %}

                    <!-- Username -->
                    <div class="mb-4">
                        <label for="id_username" class="block text-sm font-medium text-gray-700">{% trans "Username" %}</label>
                        <input type="text" name="username" id="id_username" required
                               class="input w-full p-2 mt-1 text-sm placeholder-gray-400"
                               placeholder="{% trans 'Username' %}">
                    </div>

                    <!-- Password -->
                    <div class="mb-4">
                        <div class="flex items-center justify-between">
                            <label for="id_password" class="block text-sm font-medium text-gray-700">{% trans "Password" %}</label>
                            <a href="#" class="text-sm text-gray-500 hover:text-gray-900">{% trans "Forgot your password?" %}</a>
                        </div>
                        <input type="password" name="password" id="id_password" required
                               class="input w-full p-2 mt-1 text-sm placeholder-gray-400"
                               placeholder="••••••••">
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="login-button w-full py-2.5 text-sm font-medium mb-4">{% trans "Login" %}</button>


                </form>

                <!-- Image Placeholder Section -->
                <div class="hidden md:block bg-gray-200 p-6">
                    <div class="flex items-center justify-center h-full">
                        <svg class="w-16 h-16 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" stroke-width="2"/>
                            <path stroke-width="2" d="M12 6v12m-6-6h12"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
